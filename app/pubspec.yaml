name: world_cup_2026
description: "2026 World Cup - Centaurus prediction app for teens"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.0

  # Authentication providers
  google_sign_in: ^7.0.0
  sign_in_with_apple: ^7.0.0
  crypto: ^3.0.0

  # State management
  flutter_riverpod: ^3.0.0

  # Routing
  go_router: ^16.0.0

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  intl: any

  # HTTP
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
